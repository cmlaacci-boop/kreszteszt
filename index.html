function loadQuiz() {

    const quizContainer = document.getElementById('quiz');

    let output = '';



    quizData.forEach((q, qIndex) => {

        // Ellenőrizzük, van-e megadva kép a kérdéshez

        let imageHtml = '';

        if (q.image && q.image !== "") {

            imageHtml = `<img src="${q.image}" class="question-img" alt="KRESZ szituáció">`;

        }



        output += `

            <div class="question" id="q-block-${qIndex}">

                <div class="question-text">${q.question} <span style="color:#64748b; font-size:14px; font-weight:normal;">(${q.points} pont)</span></div>

                ${imageHtml}

                <div class="options-route">

                    ${q.options.map((opt, oIndex) => `

                        <button class="option-btn" id="btn-${qIndex}-${oIndex}" onclick="selectOption(${qIndex}, ${oIndex})">

                            ${opt}

                        </button>

                    `).join('')}

                </div>

                <div class="feedback" id="feedback-${qIndex}"></div>

            </div>

        `;

    });

    quizContainer.innerHTML = output;

}



let userAnswers = {};



function selectOption(qIndex, oIndex) {

    quizData[qIndex].options.forEach((_, i) => {

        document.getElementById(`btn-${qIndex}-${i}`).style.borderColor = '#cbd5e1';

        document.getElementById(`btn-${qIndex}-${i}`).style.backgroundColor = '#fff';

    });

   

    document.getElementById(`btn-${qIndex}-${oIndex}`).style.borderColor = '#2563eb';

    document.getElementById(`btn-${qIndex}-${oIndex}`).style.backgroundColor = '#eff6ff';

    userAnswers[qIndex] = oIndex;

}



function checkAnswers() {

    let totalScore = 0;

    let maxScore = 0;



    quizData.forEach((q, qIndex) => {

        maxScore += q.points;

        const feedbackDiv = document.getElementById(`feedback-${qIndex}`);

        feedbackDiv.style.display = "block";



        const selected = userAnswers[qIndex];

       

        q.options.forEach((_, oIndex) => {

            const btn = document.getElementById(`btn-${qIndex}-${oIndex}`);

            if (oIndex === q.correct) {

                btn.className = "option-btn correct";

            } else if (selected === oIndex) {

                btn.className = "option-btn wrong";

            }

        });



        // ITT MÓDOSÍTOTTUK: Most már mindkét esetben kiírja a magyarázatot (q.explain)

        if (selected === q.correct) {

            totalScore += q.points;

            feedbackDiv.innerHTML = `<span style="color:#10b981; font-weight:bold;">Helyes válasz! (+${q.points} pont)</span><br><span style="color:#475569; font-size:15px;">Magyarázat: ${q.explain}</span>`;

            feedbackDiv.style.borderLeft = "4px solid #10b981";

        } else {

            feedbackDiv.innerHTML = `<span style="color:#ef4444; font-weight:bold;">Sajnos hibás.</span><br><span style="color:#475569; font-size:15px;">Magyarázat: ${q.explain}</span>`;

            feedbackDiv.style.borderLeft = "4px solid #ef4444";

        }

    });



    const resultBox = document.getElementById('result-box');

    resultBox.style.display = "block";

   

    let uzenet = "";

    const szazalek = (totalScore / maxScore) * 100;



    if(szazalek === 100) {

        uzenet = "🥇 Hibátlan! Teljesen lenyűgöztél, igazi KRESZ professzor vagy! ❤️ Safe utat nekünk!";

    } else if (szazalek >= 75) {

        uzenet = "🥈 Sikeres vizsga! Nagyon ügyes vagy, büszke vagyok rád! Jöhet a jogsi! 🚗";

    } else {

        uzenet = "💔 Ez most nem sikerült, de semmi baj! Gyakoroljunk még egy kicsit együtt, és legközelebb tökéletes lesz! 😘";

    }



    resultBox.innerHTML = `Eredmény: ${totalScore} / ${maxScore} pont (${Math.round(szazalek)}%)<br><br>${uzenet}`;

    document.getElementById('submit-btn').style.display = "none";
    document.getElementById('restart-btn').style.display = "block";

    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

}


// Véletlenszerű kérdéssorrend és válaszkeverés
quizData.forEach(q => {
    const correctAnswer = q.options[q.correct];
    q.options = q.options.slice().sort(() => Math.random() - 0.5);
    q.correct = q.options.indexOf(correctAnswer);
});
quizData.sort(() => Math.random() - 0.5);


loadQuiz();

</script>
