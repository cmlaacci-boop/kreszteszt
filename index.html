<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Szavazás</title>
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      overflow-x: hidden; 
      width: 100%; 
      min-height: 100vh; 
      background: #fff; 
      font-family: var(--font-sans, sans-serif);
    }
    
    .page {
      min-height: 100vh; /* Kitölti a teljes mobilkijelzőt, nem lesz távoli */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
      position: relative;
      width: 100%;
    }
    
    .title { font-size: 14px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-text-tertiary, #888); margin-bottom: 0.75rem; }
    .heading { font-size: 32px; font-weight: bold; color: var(--color-text-primary, #111); margin-bottom: 0.5rem; }
    .subheading { font-size: 16px; color: var(--color-text-secondary, #555); margin-bottom: 0.5rem; }
    .date { font-size: 13px; color: var(--color-text-tertiary, #888); margin-bottom: 2.5rem; }

    .options {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 340px;
      margin-bottom: 2rem;
      position: relative;
    }

    .option-btn {
      border: 0.5px solid var(--color-border-secondary, #ccc);
      border-radius: var(--border-radius-lg, 16px);
      background: var(--color-background-primary, #fff);
      padding: 1.25rem 1.5rem;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      font-family: inherit;
    }
    .option-btn:hover { background: var(--color-background-secondary, #f5f5f5); }
    .option-btn.highlight { border: 2px solid #D4537E; background: #FBEAF0; }

    /* Alapból normális gombként jelenik meg a listában */
    .option-btn.floating {
      width: 100%;
    }
    
    /* Csak akkor kap fix pozíciót a képernyőn, ha elmenekül */
    .option-btn.floating.fled {
      position: fixed;
      z-index: 50;
      width: 310px;
      max-width: calc(100vw - 32px);
      transition: left 0.3s cubic-bezier(.22,1,.36,1), top 0.3s cubic-bezier(.22,1,.36,1);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,.12);
    }

    .heading {
      background: linear-gradient(135deg,#D4537E,#ff8fb1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .avatar {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0;
      background: var(--color-background-secondary, #eee);
      border: 1.5px solid var(--color-border-tertiary, #ddd);
    }
    .avatar.pink { background: #F4C0D1; border-color: #ED93B1; }

    .option-label { font-size: 16px; font-weight: 600; color: var(--color-text-primary, #111); }
    .option-sub { font-size: 13px; color: var(--color-text-secondary, #555); margin-top: 2px; }
    .option-btn.highlight .option-sub { color: #993556; }

    .result {
      display: none; 
      min-height: 100vh;
      flex-direction: column; 
      align-items: center; 
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
      animation: fadeIn 0.5s ease;
      text-align: center;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .result-circle {
      width: 100px; height: 100px; border-radius: 50%;
      background: #FBEAF0; border: 2px solid #ED93B1;
      display: flex; align-items: center; justify-content: center; font-size: 48px;
    }
    .result-title { font-size: 26px; font-weight: bold; color: var(--color-text-primary, #111); }
    .result-msg { font-size: 16px; color: var(--color-text-secondary, #555); max-width: 290px; line-height: 1.6; }
    .result-date { font-size: 13px; color: var(--color-text-tertiary, #888); padding: 6px 16px; border: 0.5px solid var(--color-border-tertiary, #ccc); border-radius: 999px; }
    .reset-btn { margin-top: 1.5rem; font-size: 14px; color: var(--color-text-tertiary, #888); background: none; border: none; cursor: pointer; padding: 6px 12px; border-radius: 6px; font-family: inherit; }
    .reset-btn:hover { background: var(--color-background-secondary, #eee); }

    .hearts { position: fixed; top:0; left:0; right:0; bottom:0; pointer-events:none; z-index:200; overflow:hidden; }
    .heart { position:absolute; font-size:24px; animation: floatUp 2.5s ease-out forwards; opacity:0; }
    @keyframes floatUp { 0%{opacity:1; transform:translateY(0) scale(1);} 80%{opacity:0.8;} 100%{opacity:0; transform:translateY(-340px) scale(1.4);} }
  </style>
</head>
<body>

<div class="hearts" id="hearts"></div>

<div class="page" id="voting-view">
  <p class="title">Ma ki a legszebb?</p>
  <h1 class="heading">Szavazz most!</h1>
  <p class="subheading">Válassz egyet az alábbiak közül</p>
  <p class="date" id="today-date"></p>

  <div class="options" id="options-container">
    <button class="option-btn highlight" onclick="choose()">
      <div class="avatar pink">👸</div>
      <div>
        <p class="option-label">Szépszemüke</p>
        <p class="option-sub">A mai és minden nap legszebb ✨</p>
      </div>
    </button>
  </div>
</div>

<div class="result" id="result-view">
  <div class="result-circle">👸</div>
  <p class="result-title">Szépszemüke!</p>
  <p class="result-msg">Természetesen! Ma is ő a legszebb — ahogy minden egyes nap. 💕</p>
  <p class="result-date" id="result-date-text"></p>
  <button class="reset-btn" onclick="resetVote()">↩ Vissza</button>
</div>

<script>
const months = ['január','február','március','április','május','június','július','augusztus','szeptember','október','november','december'];
const days = ['vasárnap','hétfőn','kedden','szerdán','csütörtökön','pénteken','szombaton'];
const now = new Date();
document.getElementById('today-date').textContent =
  now.getFullYear() + '. ' + months[now.getMonth()] + ' ' + now.getDate() + '. — ' + days[now.getDay()];
document.getElementById('result-date-text').textContent =
  now.getFullYear() + '. ' + months[now.getMonth()] + ' ' + now.getDate() + '.';

const funnyNames = [
  { name: 'Gipsz Jakab', emoji: '🥴', sub: 'Kicsit savanyú arcú' },
  { name: 'Tepsi Barnabás', emoji: '🍞', sub: 'Mindig sütőben van valami' },
  { name: 'Buksi Elemér', emoji: '🪨', sub: 'Fejjel a falnak megy' },
  { name: 'Zsuzsi néni kutyája', emoji: '🐕', sub: 'Vicces de nem szép' },
  { name: 'Csontos Árpád', emoji: '💀', sub: 'Elég vékony alkat' },
  { name: 'Dagadt Béla', emoji: '🐷', sub: 'Sok sört ivott' },
  { name: 'Lompos Tivadar', emoji: '🧦', sub: 'A zokniját sem veszi fel' },
  { name: 'Kárpát-medence', emoji: '🗺️', sub: 'Szép táj, de nem ő' },
  { name: 'Egy kő az útból', emoji: '🪨', sub: 'Legalább nem mozog' },
  { name: 'Anonymus szobra', emoji: '🗿', sub: 'Arcát senki nem látja' },
];

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

const picked = shuffle(funnyNames).slice(0, 3);
const floatingBtns = [];
const container = document.getElementById('options-container');

function getSzepszemukeRect() {
  const btn = document.querySelector('.option-btn.highlight');
  return btn ? btn.getBoundingClientRect() : { left: 0, top: 0, right: 340, bottom: 100 };
}

function isTooClose(x, y, btnWidth, btnHeight, safe) {
  return (
    x < safe.right + 20 &&
    x + btnWidth > safe.left - 20 &&
    y < safe.bottom + 20 &&
    y + btnHeight > safe.top - 20
  );
}

function safePosition(btn) {
  const safe = getSzepszemukeRect();
  const btnWidth = btn.offsetWidth || 280; 
  const btnHeight = btn.offsetHeight || 76;
  
  const maxX = window.innerWidth - btnWidth - 16;
  const maxY = window.innerHeight - btnHeight - 16;
  
  let x, y, tries = 0;
  do {
    x = 8 + Math.random() * Math.max(1, maxX);
    y = 8 + Math.random() * Math.max(1, maxY);
    tries++;
  } while (tries < 50 && isTooClose(x, y, btnWidth, btnHeight, safe));
  
  return { x, y };
}

picked.forEach((person, i) => {
  const btn = document.createElement('button');
  btn.className = 'option-btn floating';
  btn.id = 'funny-' + i;
  btn.innerHTML = `
    <div class="avatar">${person.emoji}</div>
    <div>
      <p class="option-label">${person.name}</p>
      <p class="option-sub">${person.sub}</p>
    </div>`;

  container.appendChild(btn);
  floatingBtns.push(btn);

  btn.addEventListener('mousemove', (e) => {
    const r = btn.getBoundingClientRect();
    const dx = e.clientX - (r.left + r.width / 2);
    const dy = e.clientY - (r.top + r.height / 2);
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 60) flee(btn);
  });

  btn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    flee(btn);
  }, { passive: false });
});

function flee(btn) {
  if (!btn.classList.contains('fled')) {
    const rect = btn.getBoundingClientRect();
    btn.style.width = Math.min(310, window.innerWidth - 32) + 'px';
    btn.classList.add('fled');
    document.body.appendChild(btn);
  }
  
  const pos = safePosition(btn);
  btn.style.left = pos.x + 'px';
  btn.style.top = pos.y + 'px';
}

window.addEventListener('resize', () => {
  floatingBtns.forEach(btn => {
    if (btn.classList.contains('fled') && btn.style.display !== 'none') {
      flee(btn);
    }
  });
});

function spawnHearts() {
  const c = document.getElementById('hearts');
  const emojis = ['💕','✨','💖','🌸','💗','⭐','💝'];
  for (let i = 0; i < 18; i++) {
    setTimeout(() => {
      const h = document.createElement('span');
      h.className = 'heart';
      h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      h.style.left = Math.random() * 90 + 5 + '%';
      h.style.bottom = '0px';
      h.style.animationDelay = Math.random() * 0.6 + 's';
      c.appendChild(h);
      setTimeout(() => h.remove(), 3500);
    }, i * 80);
  }
}

function choose() {
  spawnHearts();
  floatingBtns.forEach(b => b.style.display = 'none');
  setTimeout(() => {
    document.getElementById('voting-view').style.display = 'none';
    const rv = document.getElementById('result-view');
    rv.style.display = 'flex';
  }, 600);
}

function resetVote() {
  document.getElementById('result-view').style.display = 'none';
  document.getElementById('voting-view').style.display = 'flex';
  
  floatingBtns.forEach((btn) => {
    btn.style.display = '';
    btn.classList.remove('fled');
    btn.style.left = '';
    btn.style.top = '';
    btn.style.width = '';
    container.appendChild(btn);
  });
}
</script>
</body>
</html>
