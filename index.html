
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .page {
    min-height: 520px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    text-align: center;
    font-family: var(--font-sans);
    position: relative;
  }
  .title { font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-text-tertiary); margin-bottom: 0.5rem; }
  .heading { font-size: 28px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 0.25rem; }
  .subheading { font-size: 15px; color: var(--color-text-secondary); margin-bottom: 0.5rem; }
  .date { font-size: 13px; color: var(--color-text-tertiary); margin-bottom: 2rem; }

  .options {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 340px;
    margin-bottom: 2rem;
  }

  .option-btn {
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-lg);
    background: var(--color-background-primary);
    padding: 1rem 1.25rem;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    font-family: var(--font-sans);
  }
  .option-btn:hover { background: var(--color-background-secondary); }
  .option-btn.highlight { border: 2px solid #D4537E; background: #FBEAF0; }
  .option-btn.highlight:hover { background: #F4C0D1; }

  .option-btn.floating {
    position: fixed;
    z-index: 50;
    width: 280px;
    transition: left 0.35s cubic-bezier(.22,1,.36,1), top 0.35s cubic-bezier(.22,1,.36,1), transform .2s ease, box-shadow .2s ease;
    pointer-events: auto;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,.12);
  }
  .option-btn.floating:hover{
    transform: scale(1.04);
  }

  .options{
    position:relative;
  }

  .heading{
    background: linear-gradient(135deg,#D4537E,#ff8fb1);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
  }

  .avatar {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
    background: var(--color-background-secondary);
    border: 1.5px solid var(--color-border-tertiary);
  }
  .avatar.pink { background: #F4C0D1; border-color: #ED93B1; }

  .option-label { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
  .option-sub { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
  .option-btn.highlight .option-sub { color: #993556; }

  .ghost {
    height: 76px;
    border-radius: var(--border-radius-lg);
    background: var(--color-background-secondary);
    border: 0.5px dashed var(--color-border-tertiary);
    opacity: 0.4;
  }

  .result {
    display: none; flex-direction: column; align-items: center; gap: 1.25rem;
    animation: fadeIn 0.5s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .result-circle {
    width: 90px; height: 90px; border-radius: 50%;
    background: #FBEAF0; border: 2px solid #ED93B1;
    display: flex; align-items: center; justify-content: center; font-size: 44px;
  }
  .result-title { font-size: 24px; font-weight: 500; color: var(--color-text-primary); }
  .result-msg { font-size: 15px; color: var(--color-text-secondary); max-width: 280px; line-height: 1.6; }
  .result-date { font-size: 12px; color: var(--color-text-tertiary); padding: 4px 14px; border: 0.5px solid var(--color-border-tertiary); border-radius: 999px; }
  .reset-btn { margin-top: 1rem; font-size: 13px; color: var(--color-text-tertiary); background: none; border: none; cursor: pointer; padding: 4px 8px; border-radius: var(--border-radius-md); font-family: var(--font-sans); }
  .reset-btn:hover { background: var(--color-background-secondary); }

  .hearts { position: fixed; top:0;left:0;right:0;bottom:0; pointer-events:none; z-index:200; overflow:hidden; }
  .heart { position:absolute; font-size:22px; animation: floatUp 2.5s ease-out forwards; opacity:0; }
  @keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1);} 80%{opacity:0.8;} 100%{opacity:0;transform:translateY(-320px) scale(1.4);} }
</style>

<div class="hearts" id="hearts"></div>

<div class="page" id="voting-view">
  <p class="title">Ma ki a legszebb?</p>
  <h1 class="heading">Szavazz most!</h1>
  <p class="subheading">Válassz egyet az alábbiak közül</p>
  <p class="date" id="today-date"></p>

  <div class="options">
    <button class="option-btn highlight" onclick="choose()">
      <div class="avatar pink">👸</div>
      <div>
        <p class="option-label">Szépszemüke</p>
        <p class="option-sub">Csak is te lehetsz ✨</p>
      </div>
    </button>
    <div class="ghost" id="ghost1"></div>
    <div class="ghost" id="ghost2"></div>
    <div class="ghost" id="ghost3"></div>
  </div>
</div>

<div class="result" id="result-view">
  <div class="result-circle">👸</div>
  <p class="result-title">Szépszemüke!</p>
  <p class="result-msg">Természetesen! Ma is ő a legszebb — ahogy minden egyes nap. 💕</p>
  <p class="result-date" id="result-date-text"></p>
  <button class="reset-btn" onclick="resetVote()">↩ Vissza</button>
</div>

<script>
const months = ['január','február','március','április','május','június','július','augusztus','szeptember','október','november','december'];
const days = ['vasárnap','hétfőn','kedden','szerdán','csütörtökön','pénteken','szombaton'];
const now = new Date();
document.getElementById('today-date').textContent =
  now.getFullYear() + '. ' + months[now.getMonth()] + ' ' + now.getDate() + '. — ' + days[now.getDay()];
document.getElementById('result-date-text').textContent =
  now.getFullYear() + '. ' + months[now.getMonth()] + ' ' + now.getDate() + '.';

const funnyNames = [
  { name: 'Gipsz Jakab', emoji: '🥴', sub: 'Kicsit savanyú arcú' },
  { name: 'Tepsi Barnabás', emoji: '🍞', sub: 'Mindig sütőben van valami' },
  { name: 'Buksi Elemér', emoji: '🪨', sub: 'Fejjel a falnak megy' },
  { name: 'Zsuzsi néni kutyája', emoji: '🐕', sub: 'Vicces de nem szép' },
  { name: 'Csontos Árpád', emoji: '💀', sub: 'Elég vékony alkat' },
  { name: 'Dagadt Béla', emoji: '🐷', sub: 'Sok sört ivott' },
  { name: 'Lompos Tivadar', emoji: '🧦', sub: 'A zokniját sem veszi fel' },
  { name: 'Kárpát-medence', emoji: '🗺️', sub: 'Szép táj, de nem ő' },
  { name: 'Egy kő az útból', emoji: '🪨', sub: 'Legalább nem mozog' },
  { name: 'Anonymus szobra', emoji: '🗿', sub: 'Arcát senki nem látja' },
];

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

const picked = shuffle(funnyNames).slice(0, 3);
const floatingBtns = [];

function getSzepszemukeRect() {
  const btn = document.querySelector('.option-btn.highlight');
  return btn ? btn.getBoundingClientRect() : { left: 0, top: 0, right: 340, bottom: 100 };
}

function isTooClose(x, y, safe) {
  return (
    x < safe.right + 20 &&
    x + 280 > safe.left - 20 &&
    y < safe.bottom + 20 &&
    y + 76 > safe.top - 20
  );
}

function safePosition(safe) {
  const maxX = window.innerWidth - 290;
  const maxY = window.innerHeight - 90;
  let x, y, tries = 0;
  do {
    x = 10 + Math.random() * maxX;
    y = 10 + Math.random() * maxY;
    tries++;
  } while (tries < 30 && isTooClose(x, y, safe));
  return { x, y };
}

picked.forEach((person, i) => {
  const btn = document.createElement('button');
  btn.className = 'option-btn floating';
  btn.id = 'funny-' + i;
  btn.innerHTML = `
    <div class="avatar">${person.emoji}</div>
    <div>
      <p class="option-label">${person.name}</p>
      <p class="option-sub">${person.sub}</p>
    </div>`;

  const gh = document.getElementById('ghost' + (i + 1));
  const ghRect = gh.getBoundingClientRect();
  btn.style.left = ghRect.left + 'px';
  btn.style.top = (ghRect.top + window.scrollY) + 'px';

  document.body.appendChild(btn);
  floatingBtns.push(btn);

  

  btn.addEventListener('mousemove', (e) => {
    const r = btn.getBoundingClientRect();
    const dx = e.clientX - (r.left + r.width / 2);
    const dy = e.clientY - (r.top + r.height / 2);
    const dist = Math.sqrt(dx*dx + dy*dy);

    // csak akkor meneküljön el, ha tényleg ráhúzza az egeret a névre
    if (dist < 45) flee(btn);
  });

  btn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    flee(btn);
  }, { passive: false });
});

function flee(btn) {
  const safe = getSzepszemukeRect();
  const pos = safePosition(safe);
  btn.style.left = pos.x + 'px';
  btn.style.top = pos.y + 'px';
}

function spawnHearts() {
  const c = document.getElementById('hearts');
  const emojis = ['💕','✨','💖','🌸','💗','⭐','💝'];
  for (let i = 0; i < 18; i++) {
    setTimeout(() => {
      const h = document.createElement('span');
      h.className = 'heart';
      h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      h.style.left = Math.random() * 90 + 5 + '%';
      h.style.bottom = '0px';
      h.style.animationDelay = Math.random() * 0.6 + 's';
      c.appendChild(h);
      setTimeout(() => h.remove(), 3500);
    }, i * 80);
  }
}

function choose() {
  spawnHearts();
  floatingBtns.forEach(b => b.style.display = 'none');
  setTimeout(() => {
    document.getElementById('voting-view').style.display = 'none';
    const rv = document.getElementById('result-view');
    rv.style.display = 'flex';
    rv.style.flexDirection = 'column';
    rv.style.alignItems = 'center';
  }, 600);
}

function resetVote() {
  document.getElementById('result-view').style.display = 'none';
  document.getElementById('voting-view').style.display = 'flex';
  floatingBtns.forEach(b => {
    b.style.display = '';
    const safe = getSzepszemukeRect();
    const pos = safePosition(safe);
    b.style.left = pos.x + 'px';
    b.style.top = pos.y + 'px';
  });
}
</script>
